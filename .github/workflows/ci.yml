name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/VINWMIVehicles.Tests/VINWMIVehicles.Tests.csproj

      - name: Build
        run: dotnet build src/VINWMIVehicles.Tests/VINWMIVehicles.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test src/VINWMIVehicles.Tests/VINWMIVehicles.Tests.csproj --no-build --configuration Release --verbosity normal